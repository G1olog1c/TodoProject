{% extends 'tasks/base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="card-title text-danger">Usunąć zadanie?</h2>
        <p>Czy na pewno chcesz usunąć zadanie <strong>„{{ object.title }}"</strong>? Tej operacji nie można cofnąć.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Tak, usuń</button>
            <a href="{% url 'task_list' %}" class="btn btn-secondary">Anuluj</a>
        </form>
    </div>
</div>
{% endblock %}
