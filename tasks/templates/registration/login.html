{% extends 'tasks/base.html' %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Logowanie</h2>
                {% if form.errors %}
                    <div class="alert alert-danger">Nieprawidłowa nazwa użytkownika lub hasło.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nazwa użytkownika</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Hasło</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Zaloguj</button>
                </form>
                <p class="mt-3 mb-0 text-center">
                    Nie masz konta? <a href="{% url 'signup' %}">Zarejestruj się</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
